<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Under Construction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 3em;
            color: #03dac6;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .construction-icon {
            font-size: 5em;
            color: #bb86fc;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            color: #121212;
            background-color: #bb86fc;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        a:hover {
            background-color: #03dac6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="construction-icon">&#128679;</div>
        <h1>Page Under Construction</h1>
        <p>We're working hard to bring you something amazing. Please check back soon!</p>
        <a href="../views/login.html">LogOut</a>
    </div>
</body>
</html>
